<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل دخول الإدارة | مخللات الحلواني</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <p class="eyebrow">لوحة الإدارة</p>
        <h1>تسجيل الدخول</h1>
        <p class="helper-text">أدخل كلمة مرور الإدارة للوصول إلى صفحة التحكم بالمحتوى.</p>
        <form id="login-form" class="login-form">
          <label>
            <span>كلمة المرور</span>
            <input id="login-password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primary-button" type="submit">دخول</button>
        </form>
        <div id="login-error" class="login-error" hidden></div>
      </section>
    </main>
    <script src="login.js"></script>
  </body>
</html>
